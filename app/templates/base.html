<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{% endblock %}</title>
  <!-- Estilos CSS -->
  <style>
    body {
        font-family: 'Open Sans', sans-serif;
        background-color: #f7f7f7;
        color: #333;
        margin: 0;
        padding: 0;
    }

    header {
        background-color: #0096c7;
        color: #fff;
        text-align: center;
    }

    footer {
        background-color: #ccc;
        color: #333;
        padding: 20px;
        text-align: center;
    }

    nav {
        background-color: #0096c7;
        color: #fff;
        height: 50px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    nav ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
    }

    nav ul li {
        margin: 0 10px;
    }

    nav ul li a {
        color: #fff;
        text-decoration: none;
        font-size: 16px;
        padding: 15px;
        transition: all 0.3s ease;
    }

    nav ul li a:hover {
        background-color: #32bbe8;
    }

    nav ul li.active a {
        background-color: #666;
    }

    nav ul li.active a:hover {
        background-color: #999;
    }

  </style>
</head>
<!-- navbar/menu de navegação com as opções/menus Carros e Cadastrar Carro -->
<body>
  <header>
    <nav>
      <ul>
        <!-- Se tiver logado -->
        {% if user.is_authenticated %} <!-- Verifica se o usuário está autenticado/logado -->

            <li>Olá, {{ user.username }}</li> <!-- Exibe o nome do usuário ao logar -->
            <li><a href="{% url 'new_car' %}">Cadastrar Carro</a></li> <!-- Exibe o menu "Cadastrar Carro" apenas para usuários logados -->
            <li><a href="{% url 'logout' %}">Sair</a></li>

        {% endif %}

        <!-- Se não estiver logado -->
        {% if not user.is_authenticated %} <!-- Verifica se o usuário não está autenticado/logado -->

            <li><a href="{% url 'register' %}">Cadastre-se</a></li> <!-- Exibe o menu "Cadastre-se" apenas para usuários não logados -->
            <li><a href="{% url 'login' %}">Login</a></li> <!-- Exibe o menu "Login" apenas para usuários não logados -->

        {% endif %}

        <li><a href="{% url 'cars_list' %}">Carro</a></li> <!-- Exibe o menu "Carro" para todos os usuários, independentemente de estarem logados ou não -->
      </ul>
    </nav>
  </header>

  <main>
    {% block content %}
    {% endblock %}
  </main>

  <footer>
    <p>&copy; 2026 LS Multimarcas</p>
  </footer>
</body>
</html>
